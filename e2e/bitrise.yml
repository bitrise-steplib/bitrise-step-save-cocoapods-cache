format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  test_cocoapods:
    envs:
    - TEST_APP_URL: https://github.com/bitrise-io/Bitrise-iOS-Cocoapods-Sample
    - BRANCH: main
    before_run:
    - _setup
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
    - cocoapods-install: { }
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"
    - script:
        title: Remove Pods and cache
        inputs:
        - content: |-
            set -ex
            rm -rf Pods
            rm -rf ~/.cocoapods
    - restore-cache:
        run_if: "true"
        is_skippable: false
        inputs:
        - key: |-
            {{ .Arch }}-cocoapods-cache-{{ checksum "**/Podfile.lock" }}
        - verbose: "true"
    - cocoapods-install:
        title: Install Cocoapods again

  test_empty:
    description: |
      Tests the case when there is nothing to compress based on the cache paths. The step returns early in this case
      with a 0 exit code
    steps:
    - change-workdir:
        title: Switch working dir to _tmp
        inputs:
        - path: ./_tmp
        - is_create_path: true
    - path::./:
        title: Execute step
        run_if: "true"
        is_skippable: false
        inputs:
        - verbose: "true"

  _setup:
    steps:
    - script:
        title: Delete _tmp dir
        inputs:
        - content: rm -rf _tmp
    - git::https://github.com/bitrise-steplib/bitrise-step-simple-git-clone.git:
        inputs:
        - repository_url: $TEST_APP_URL
        - clone_into_dir: ./_tmp
        - branch: $BRANCH
